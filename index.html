<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特別ご優待のご案内</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
      background: #eceef1;
      color: #2f2f2f;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img {
      max-width: 100%;
      display: block;
    }

    /* 上部ビジュアル */
    .hero {
      position: relative;
      min-height: 100vh;
      background:
        linear-gradient(rgba(255,255,255,0.45), rgba(255,255,255,0.45)),
        url("movie-poster.jpg") center center / cover no-repeat;
      overflow: hidden;
    }

    /* 背景動画 */
    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.28;
      z-index: 0;
      pointer-events: none;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.42);
      z-index: 1;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding-top: 110px;
      padding-bottom: 80px;
    }

    .vertical-area {
      gap: 24px;
    }

    /* 縦タイトル */
    .vertical-title,
    .vertical-sub {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      margin: 0;
    }

    .vertical-title {
      font-size: 3rem;
      letter-spacing: 0.02em;
      line-height: 1.05;
      color: #222;
      font-weight: 600;
      filter: blur(0.7px);
      text-shadow:
        0 0 6px rgba(0,0,0,0.08),
        0 0 10px rgba(0,0,0,0.04);
    }

    @media (max-width: 768px) {
  .vertical-title {
    font-size: 2.0rem; /* ←ここ上げる */
    letter-spacing: 0.01em;
    line-height: 1.1;
  }
}

    .vertical-sub {
      font-size: 1.1rem;
      line-height: 2.1;
      letter-spacing: 0.1em;
      color: #3d3d3d;
      padding-top: 22px;
    }

    /* 1文字ずつ */
    .vertical-title span,
    .vertical-sub span {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
      filter: blur(6px);
    }

    .vertical-title span {
      animation: fadeChar 2.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .vertical-sub span {
      animation: fadeChar 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

  .vertical-title span:nth-child(1) { animation-delay: 0.1s; }
.vertical-title span:nth-child(2) { animation-delay: 0.25s; }
.vertical-title span:nth-child(3) { animation-delay: 0.4s; }
.vertical-title span:nth-child(4) { animation-delay: 0.55s; }
.vertical-title span:nth-child(5) { animation-delay: 0.7s; }
.vertical-title span:nth-child(6) { animation-delay: 0.85s; }
.vertical-title span:nth-child(7) { animation-delay: 1.0s; }
.vertical-title span:nth-child(8) { animation-delay: 1.15s; }
.vertical-title span:nth-child(9) { animation-delay: 1.3s; }

.vertical-sub span:nth-child(1)  { animation-delay: 1.5s; }
.vertical-sub span:nth-child(2)  { animation-delay: 1.65s; }
.vertical-sub span:nth-child(3)  { animation-delay: 1.8s; }
.vertical-sub span:nth-child(4)  { animation-delay: 1.95s; }
.vertical-sub span:nth-child(5)  { animation-delay: 2.1s; }
.vertical-sub span:nth-child(6)  { animation-delay: 2.25s; }
.vertical-sub span:nth-child(7)  { animation-delay: 2.4s; }
.vertical-sub span:nth-child(8)  { animation-delay: 2.55s; }
.vertical-sub span:nth-child(9)  { animation-delay: 2.7s; }
.vertical-sub span:nth-child(10) { animation-delay: 2.85s; }
.vertical-sub span:nth-child(11) { animation-delay: 3.0s; }
.vertical-sub span:nth-child(12) { animation-delay: 3.15s; }
.vertical-sub span:nth-child(13) { animation-delay: 3.3s; }
.vertical-sub span:nth-child(14) { animation-delay: 3.45s; }
.vertical-sub span:nth-child(15) { animation-delay: 3.6s; }
.vertical-sub span:nth-child(16) { animation-delay: 3.75s; }
.vertical-sub span:nth-child(17) { animation-delay: 3.9s; }
.vertical-sub span:nth-child(18) { animation-delay: 4.05s; }
.vertical-sub span:nth-child(19) { animation-delay: 4.2s; }

    @keyframes fadeChar {
      0% {
        opacity: 0;
        transform: translateY(20px);
        filter: blur(6px);
      }
      60% {
        opacity: 0.6;
        filter: blur(2px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    /* 本文エリア */
    .content {
      background: #eceef1;
      padding: 110px 0 140px;
    }

    .message {
      max-width: 680px;
      margin: 0 auto;
      text-align: center;
      color: #333;
      line-height: 2.3;
      font-size: 1.02rem;
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(30px);
      filter: blur(4px);
      animation: fadeMessageSection 3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 4.5s;
    }

    .message p {
      margin: 0 0 36px;
    }

    .message strong {
      font-weight: 700;
    }

    @keyframes fadeMessageSection {
      0% {
        opacity: 0;
        transform: translateY(30px);
        filter: blur(4px);
      }
      60% {
        opacity: 0.6;
        filter: blur(1.5px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    /* 鈴画像 */
    .bell-image-wrap {
      max-width: 480px;
      margin: 100px auto 90px;
      opacity: 0;
      transform: translateY(40px) scale(1.03);
      animation: fadeImageElegant 3.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 5.5s;
    }

    .bell-image {
      width: 100%;
      border-radius: 999px;
      box-shadow: 0 0 55px rgba(255,255,255,0.95);
      -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 56%, rgba(0,0,0,0) 88%);
      mask-image: radial-gradient(circle, rgba(0,0,0,1) 56%, rgba(0,0,0,0) 88%);
    }

    @keyframes fadeImageElegant {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(1.05);
      }
      60% {
        opacity: 0.6;
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* 水琴鈴セクション */
    .about-bell {
      max-width: 680px;
      margin: 0 auto;
      text-align: center;
      opacity: 0;
      transform: translateY(30px);
      filter: blur(4px);
      animation: fadeAbout 3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 5.2s;
    }

    .about-bell h2 {
      margin: 0 0 40px;
      font-size: 1.45rem;
      letter-spacing: 0.14em;
      font-weight: 500;
      opacity: 0;
      transform: translateY(20px);
      filter: blur(3px);
      animation: fadeAboutTitle 2.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 5.2s;
    }

    .about-bell p {
      margin: 0 0 30px;
      font-size: 1.02rem;
      line-height: 2.3;
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(20px);
      filter: blur(3px);
      animation: fadeAboutText 2.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .about-bell p:nth-of-type(1) { animation-delay: 5.8s; }
    .about-bell p:nth-of-type(2) { animation-delay: 6.3s; }

    @keyframes fadeAbout {
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes fadeAboutTitle {
      0% {
        opacity: 0;
        transform: translateY(20px);
        filter: blur(3px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes fadeAboutText {
      0% {
        opacity: 0;
        transform: translateY(20px);
        filter: blur(3px);
      }
      60% {
        opacity: 0.6;
        filter: blur(1px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    /* フッター */
    .footer-info {
      margin-top: 110px;
      background: #e7e4df;
      padding: 48px 0;
    }

    .shop-name {
      font-size: 1.3rem;
      margin: 0 0 22px;
      font-weight: 700;
    }

    .footer-info p {
      margin: 0 0 10px;
      font-size: 0.92rem;
      line-height: 1.9;
      letter-spacing: 0.04em;
    }

    .right-col {
      padding-top: 42px;
    }

    @media (max-width: 767.98px) {
      .hero {
        min-height: 760px;
      }

      .hero-inner {
        min-height: 760px;
        padding-top: 80px;
      }

      .vertical-area {
        gap: 18px;
      }

      .vertical-sub {
        font-size: 0.9rem;
        line-height: 1.9;
      }

      .content {
        padding: 64px 0 90px;
      }

      .message,
      .about-bell p {
        font-size: 0.98rem;
        line-height: 2.05;
      }

      .about-bell h2 {
        font-size: 1.2rem;
      }

      .right-col {
        padding-top: 0;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="movie.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <div class="container hero-inner">
      <div class="row justify-content-center">
        <div class="col-auto d-flex vertical-area">
          <h1 class="vertical-title">
            <span>特</span>
            <span>別</span>
            <span>ご</span>
            <span>優</span>
            <span>待</span>
            <span>の</span>
            <span>ご</span>
            <span>案</span>
            <span>内</span>
          </h1>

          <p class="vertical-sub">
            <span>限</span><span>ら</span><span>れ</span><span>た</span>
            <span>お</span><span>客</span><span>様</span><span>に</span><span>の</span><span>み</span>
            <span>ご</span><span>提</span><span>供</span><span>し</span><span>て</span>
            <span>お</span><span>り</span><span>ま</span><span>す</span>
          </p>
        </div>
      </div>
    </div>
  </section>

  <main class="content">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12">
          <section class="message">
            <p>
              平素より角海老グループ・池袋POLARISを
              ご愛顧賜り、誠にありがとうございます。
            </p>

            <p>
              当店より、限られた特別なお客様にのみ、<br>
              <strong>【水琴鈴】</strong>という鈴をお渡ししております。
            </p>

            <p>
              ご来店の際は、こちらの鈴をご提示ください。
              特別なご案内をさせていただきます。
            </p>
          </section>
        </div>

        <div class="col-12">
          <div class="bell-image-wrap">
            <img src="your-image.jpg" alt="水琴鈴" class="bell-image">
          </div>
        </div>

        <div class="col-12">
          <section class="about-bell">
            <h2><strong>【水琴鈴】</strong>とは</h2>

            <p>
              江戸より伝わる水琴窟の音色を宿した、
              特別な鈴でございます。
              澄み渡るその響きは、琴やオルゴールのように
              静かに心へと届きます。
            </p>

            <p>
              古くより、魔除けや福を呼び込むものとして伝えられ、
              今もなお、大切に受け継がれております。
            </p>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script>
    window.addEventListener('load', () => {
      const video = document.querySelector('.bg-video');
      if (video) {
        video.playbackRate = 0.35;
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
